<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Order Processing System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Order Processing System</h1>

    <section class="card">
      <h2>Create Order</h2>
      <label>Customer: <input id="customer" type="text" /></label>
      <label>Item: <input id="items" type="text" /></label>
      <label>Quantity: <input id="quantity" type="number" step="0.01" /></label>
     <label>Priority Order: <input id="priority" type="number" /></label>
      <div class="row">
        <button id="createBtn" class="btn primary">Create Order</button>
      </div>
    </section>

    <section class="card">
      <div class="header-row">
        <h2>Orders</h2>
        <div>
          <button id="refreshBtn" class="btn refresh">Refresh</button>
          <button id="processBtn" class="btn primary">Process Next</button>
        </div>
      </div>
      <div id="ordersList" class="orders"></div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
